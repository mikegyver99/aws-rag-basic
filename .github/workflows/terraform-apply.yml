name: Terraform Apply (manual)

on:
  workflow_dispatch:
    inputs:
      approve:
        description: 'Confirm to run terraform apply'
        required: true
        default: 'no'
      environment:
        description: 'Environment to apply (folder under environments/)'
        required: false
        default: 'dev'

jobs:
  apply:
    name: Terraform Apply
    if: ${{ github.event.inputs.approve == 'yes' }}
    environment: ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Render backend config
        env:
          ACCOUNT: ${{ secrets.AWS_ACCOUNT }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y gettext-base
          echo "Rendering environments/${ENVIRONMENT}/backend.conf -> environments/${ENVIRONMENT}/backend.rendered.conf"
          envsubst < environments/${ENVIRONMENT}/backend.conf > environments/${ENVIRONMENT}/backend.rendered.conf
          echo "Rendered file contents:"
          ls -la environments/${ENVIRONMENT} || true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-west-2' }}
          audience: sts.amazonaws.com

      - name: Set environment
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: echo "Using environment=$ENVIRONMENT"

      - name: Init Terraform
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform init -backend-config=backend.rendered.conf

      - name: Terraform Apply
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform apply -auto-approve

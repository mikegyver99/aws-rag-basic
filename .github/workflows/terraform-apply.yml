name: Terraform Apply (manual)

on:
  workflow_dispatch:
    inputs:
      approve:
        description: 'Confirm to run terraform apply'
        required: true
        default: 'no'
      environment:
        description: 'Environment to apply (folder under environments/)'
        required: false
        default: 'dev'

jobs:
  apply:
    name: Terraform Apply
    if: ${{ github.event.inputs.approve == 'yes' }}
    environment: ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Render backend config
        env:
          ACCOUNT: ${{ secrets.AWS_ACCOUNT }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y gettext-base
          echo "Rendering environments/${ENVIRONMENT}/backend.conf -> environments/${ENVIRONMENT}/backend.rendered.conf"
          envsubst < environments/${ENVIRONMENT}/backend.conf > environments/${ENVIRONMENT}/backend.rendered.conf

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-west-2' }}
          audience: sts.amazonaws.com

      - name: Set environment
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: echo "Using environment=$ENVIRONMENT"

      - name: Download lambda zips from plan workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: terraform-plan.yml
          name: lambda-zips-${{ github.event.inputs.environment || 'dev' }}
          path: environments/${{ github.event.inputs.environment || 'dev' }}/
          branch: ${{ github.event.pull_request.head.ref || github.ref_name }}
          workflow_conclusion: success

      - name: Init Terraform
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform init -backend-config=backend.rendered.conf

      - name: Download plan from different workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: terraform-plan.yml # The name or filename of your plan workflow
          name: tfplan
          path: environments/${{ github.event.inputs.environment || 'dev' }}/
          # Optional: ensure you get the artifact from the PR or Branch that triggered this
          branch: ${{ github.event.pull_request.head.ref || github.ref_name }} 
          workflow_conclusion: success

      - name: Terraform Apply (from plan)
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          if [ ! -f plan.tfplan ]; then
            echo "Plan file not found in working directory: $(pwd)" >&2
            ls -la ../../environments/* || true
            exit 1
          fi
          terraform show -no-color plan.tfplan
          terraform apply -input=false plan.tfplan

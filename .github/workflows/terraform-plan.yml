name: Terraform Plan

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to plan (folder under environments/)'
        required: false
        default: 'dev'

jobs:
  plan:
    name: Terraform Plan
    environment: ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Render backend config
        env:
          ACCOUNT: ${{ secrets.AWS_ACCOUNT }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y gettext-base
          echo "Rendering environments/${ENVIRONMENT}/backend.conf -> environments/${ENVIRONMENT}/backend.rendered.conf"
          envsubst < environments/${ENVIRONMENT}/backend.conf > environments/${ENVIRONMENT}/backend.rendered.conf

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION || 'us-west-2' }}
          audience: sts.amazonaws.com

      - name: Set environment
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: echo "Using environment=$ENVIRONMENT"

      - name: Build lambda zips
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y zip
          mkdir -p modules/lambda/.build
          echo "Creating ingest zip..."
          (cd lambdas/ingest && zip -r "${{ github.workspace }}/modules/lambda/.build/ingest.zip" .)
          echo "Creating query zip..."
          (cd lambdas/query && zip -r "${{ github.workspace }}/modules/lambda/.build/query.zip" .)

      - name: Init Terraform
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform init -backend-config=backend.rendered.conf

      - name: Terraform Format Check
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform fmt -check

      - name: Terraform Plan
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform plan -out=plan.tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: environments/${{ github.event.inputs.environment || 'dev' }}/plan.tfplan

      - name: Upload lambda zips
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zips-${{ github.event.inputs.environment || 'dev' }}
          path: modules/lambda/.build/*.zip
          include-hidden-files: true
          if-no-files-found: warn
